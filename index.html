  <meta name="theme-color" content="#111111">

  <meta property="og:title" content="青葉 첫빛 - 1화">

  <style>
    :root {
      --page-bg: #111111;
      --strip-bg: #ffffff;
      --text-primary: #f7f7f7;
      --text-muted: #aaaaaa;
      --header-bg: #161616;
      --border-subdued: #2a2a2a;
      --accent-soft: #d7efe6;
      --strip-max: 720px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--page-bg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border-subdued);
      background: color-mix(in srgb, var(--header-bg) 92%, transparent);
      backdrop-filter: blur(14px);
    }

    .header-inner {
      width: min(100%, var(--strip-max));
      margin: 0 auto;
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .brand {
      min-width: 0;
    }

    .eyebrow,
    .meta {
      margin: 0;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 5.4vw, 28px);
      line-height: 1.18;
      font-weight: 760;
      word-break: keep-all;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex: 0 0 auto;
    }

    .button {
      min-height: 36px;
      padding: 0 var(--space-3);
      border: 1px solid var(--border-subdued);
      border-radius: 8px;
      background: transparent;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 650;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
    }

    .button.primary {
      border-color: transparent;
      background: var(--accent-soft);
      color: var(--page-bg);
    }

    .intro {
      width: min(100%, var(--strip-max));
      margin: 0 auto;
      padding: var(--space-8) var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--border-subdued);
    }

    .intro p {
      max-width: 56ch;
      margin: var(--space-3) 0 0;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
      word-break: keep-all;
    }

    .intro-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
      margin-top: var(--space-5);
      padding: 0;
      list-style: none;
    }

    .intro-list li {
      min-height: 56px;
      padding: var(--space-3);
      border: 1px solid var(--border-subdued);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: var(--space-1);
    }

    .intro-list strong {
      font-size: 14px;
      line-height: 1.2;
    }

    .intro-list span {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .reader {
      width: min(100%, var(--strip-max));
      margin: 0 auto;
      background: var(--strip-bg);
    }

    .panel {
      margin: 0;
      line-height: 0;
      background: var(--strip-bg);
    }

    .panel img {
      display: block;
      width: 100%;
      height: auto;
      background: var(--strip-bg);
    }

    .chapter-gap {
      height: 18px;
      background: var(--strip-bg);
    }

    .site-footer {
      width: min(100%, var(--strip-max));
      margin: 0 auto;
      padding: var(--space-8) var(--space-4) var(--space-10);
      color: var(--text-muted);
      text-align: center;
      border-top: 1px solid var(--border-subdued);
    }

    .site-footer strong {
      display: block;
      color: var(--text-primary);
      font-size: 16px;
      line-height: 1.4;
    }

    .site-footer p {
      margin: var(--space-2) auto 0;
      max-width: 46ch;
      font-size: 14px;
      line-height: 1.7;
      word-break: keep-all;
    }

    @media (max-width: 520px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .button {
        flex: 1 1 0;
      }

      .intro-list {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }
    }
  </style>
</head>
